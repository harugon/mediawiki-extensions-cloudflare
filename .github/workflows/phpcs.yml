name: PHP CodeSniffer

on:
  push:
    paths:
      - '**.php'
      - '**.json'
      - composer.json
  pull_request:
    paths:
      - '**.php'
      - '**.json'
      - composer.json

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Run PHPCS with MediaWiki standards
        run: vendor/bin/phpcs -s -p
